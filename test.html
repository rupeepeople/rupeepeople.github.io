<!DOCTYPE html>
<html>
<head>
<title>Sample A — Apple Style</title>
<style>
body {
  margin:0; font-family:Inter, sans-serif;
  background:#f5f5f0; color:#0f172a;
}
.hero {
  padding:120px 20px; text-align:center;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.4);
  border-radius:20px; margin:40px;
  box-shadow:0 20px 40px rgba(0,0,0,0.1);
}
h1 { font-size:3rem; font-weight:800; }
p { font-size:1.2rem; opacity:0.8; }
.card {
  margin:20px auto; max-width:600px;
  padding:30px; border-radius:20px;
  background:rgba(255,255,255,0.5);
  backdrop-filter:blur(15px);
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}
</style>
</head>
<body>
<div class="hero">
  <h1>Apple‑Style Premium</h1>
  <p>Clean • Glass • Luxury</p>
</div>

<div class="card">Glass Card Example</div>
<div class="card">Minimal Typography</div>
<div class="card">Premium Feel</div>
</body>
</html>
